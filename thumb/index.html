<!doctype html>
<html lang="en" data-resolution="landscape">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=1920, height=1080" />
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
  @font-face{font-family:"Space Grotesk";font-weight:300;src:url("fonts/SpaceGrotesk-300.woff2") format("woff2");}
  @font-face{font-family:"Space Grotesk";font-weight:500;src:url("fonts/SpaceGrotesk-500.woff2") format("woff2");}
  @font-face{font-family:"Space Grotesk";font-weight:700;src:url("fonts/SpaceGrotesk-700.woff2") format("woff2");}
  @font-face{font-family:"IBM Plex Mono";font-weight:400;src:url("fonts/IBMPlexMono-400.woff2") format("woff2");}
  @font-face{font-family:"IBM Plex Mono";font-weight:500;src:url("fonts/IBMPlexMono-500.woff2") format("woff2");}
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:1920px;height:1080px;overflow:hidden;background:#0A0D1E;font-family:"Space Grotesk",sans-serif;color:#EEF1FA}
  .bgimg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
  .scrim{position:absolute;inset:0;background:
    linear-gradient(90deg, rgba(8,11,26,.97) 0%, rgba(8,11,26,.86) 30%, rgba(8,11,26,.20) 58%, rgba(8,11,26,.10) 78%, rgba(8,11,26,.62) 100%),
    linear-gradient(0deg, rgba(8,11,26,.93) 0%, rgba(8,11,26,.15) 26%, rgba(8,11,26,0) 48%);}
  .frame{position:absolute;inset:34px;border:1.5px solid rgba(174,184,232,.18);border-radius:18px}
  .content{position:absolute;inset:0;padding:92px 104px;display:flex;flex-direction:column;justify-content:space-between}
  .top{display:flex;align-items:center;gap:18px}
  .pill{font-family:"IBM Plex Mono",monospace;font-size:24px;letter-spacing:.18em;font-weight:500;color:#04130D;background:#23E6A8;padding:10px 18px;border-radius:10px}
  .course{font-family:"IBM Plex Mono",monospace;font-size:23px;letter-spacing:.12em;color:#AEB8E8}
  .mid{max-width:1200px}
  .eyebrow{font-family:"IBM Plex Mono",monospace;font-size:26px;letter-spacing:.28em;text-transform:uppercase;color:#F6A623;margin-bottom:18px}
  h1{font-weight:700;font-size:178px;line-height:.92;letter-spacing:-.045em}
  h1 .lens{color:#23E6A8}
  .sub{font-weight:300;font-size:46px;color:#D6DAF0;margin-top:30px;max-width:1100px;line-height:1.32}
  .sub .a{color:#F6A623;font-weight:500} .sub .m{color:#23E6A8;font-weight:500}
  .bottom{display:flex;align-items:center;justify-content:space-between;gap:30px}
  .tags{font-family:"IBM Plex Mono",monospace;font-size:30px;color:#C3C9E6;letter-spacing:.04em}
  .tags b{color:#fff;font-weight:500}
  .due{font-weight:700;font-size:40px;letter-spacing:-.01em;color:#0A0D1E;background:#F6A623;padding:14px 26px;border-radius:14px}
  .play{position:absolute;right:360px;top:50%;transform:translateY(-50%);width:150px;height:150px;border-radius:50%;
    background:rgba(35,230,168,.16);border:3px solid rgba(35,230,168,.85);display:grid;place-items:center;box-shadow:0 0 60px rgba(35,230,168,.45)}
  .play::after{content:"";margin-left:10px;border-style:solid;border-width:30px 0 30px 50px;border-color:transparent transparent transparent #EEF1FA}
</style>
</head>
<body>
  <div id="root" data-composition-id="main" data-width="1920" data-height="1080" data-start="0" data-duration="1">
    <img class="bgimg" src="assets/thumb-bg.png" alt="" />
    <div class="scrim"></div>
    <div class="play"></div>
    <div class="frame"></div>
    <div class="content">
      <div class="top">
        <div class="pill">ASSIGNMENT 03</div>
        <div class="course">LangGraph · Production AI Agents</div>
      </div>
      <div class="mid">
        <div class="eyebrow">Your startup build</div>
        <h1>Build Launch<span class="lens">Lens</span></h1>
        <div class="sub">Fuse <span class="a">what people search for</span> with <span class="m">what actually sells</span>, then ship a Go / No-Go agent.</div>
      </div>
      <div class="bottom">
        <div class="tags">LangGraph &nbsp;·&nbsp; <b>SerpApi</b> &nbsp;·&nbsp; <b>Oxylabs</b></div>
        <div class="due">DUE JUNE 28 · EOD</div>
      </div>
    </div>
  </div>
  <script>
    window.__timelines = window.__timelines || {};
    window.__timelines["main"] = gsap.timeline({ paused: true });
  </script>
</body>
</html>
